apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui-deployment
  namespace: kitchen-app
  labels: {app: kitchen-web-ui}
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxSurge: 1, maxUnavailable: 0}
  selector:
    matchLabels: {app: kitchen-web-ui}
  template:
    metadata:
      labels: {app: kitchen-web-ui}
    spec:
      containers:
        - name: kitchen-web-ui
          image: pakku28/kitchen-web:latest
          imagePullPolicy: Always
          ports: [{containerPort: 80}]
          livenessProbe:
            httpGet: {path: /health, port: 80}
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet: {path: /health, port: 80}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: {memory: '32Mi',  cpu: '25m'}
            limits:   {memory: '64Mi',  cpu: '100m'}
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui-service
  namespace: kitchen-app
spec:
  type: NodePort
  selector: {app: kitchen-web-ui}
  ports: [{port: 80, targetPort: 80, nodePort: 30080}]
