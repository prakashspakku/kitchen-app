<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>Professional Kitchen</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
    header{background:#1e293b;padding:1rem 2rem;border-bottom:2px solid #334155}
    header h1{color:#38bdf8;font-size:1.4rem}
    .container{max-width:860px;margin:2rem auto;padding:0 1rem;display:grid;gap:1.2rem}
    .card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:1.5rem}
    .card h2{color:#818cf8;font-size:1rem;margin-bottom:1rem}
    button{background:#0284c7;color:#fff;border:none;padding:.6rem 1.4rem;
           border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:700}
    button:hover{opacity:.85}
    input[type=text]{width:100%;padding:.65rem;background:#0f172a;
      border:1px solid #334155;border-radius:6px;color:#e2e8f0;margin-bottom:.75rem}
    pre{background:#0f172a;border:1px solid #334155;border-radius:6px;
        padding:.75rem;font-size:.8rem;white-space:pre-wrap;margin-top:.6rem}
    .ok{color:#4ade80} .err{color:#f87171} .muted{color:#64748b}
    table{width:100%;border-collapse:collapse;margin-top:.75rem;font-size:.85rem}
    th{background:#0f172a;color:#94a3b8;text-align:left;padding:.5rem}
    td{padding:.5rem;border-bottom:1px solid #334155}
  </style>
</head>
<body>
<header><h1>🍽  Professional Kitchen — Order Management</h1></header>
<div class='container'>
  <div class='card'>
    <h2>🔍 Kitchen Status</h2>
    <button onclick='checkHealth()'>Check API Health</button>
    <pre id='health'><span class='muted'>Click to check...</span></pre>
  </div>
  <div class='card'>
    <h2>📝 Place an Order</h2>
    <input id='dish' type='text' placeholder='Enter dish name (e.g. Masala Dosa...)'>
    <button onclick='placeOrder()'>Send to Kitchen 🚀</button>
    <pre id='order-out'><span class='muted'>Waiting...</span></pre>
  </div>
  <div class='card'>
    <h2>🗒 Recent Orders</h2>
    <button onclick='loadOrders()'>Refresh Orders</button>
    <div id='order-table'></div>
  </div>
</div>
<script>
const API='http://'+location.hostname+':3000';
async function checkHealth(){
  const el=document.getElementById('health');
  try{const r=await fetch(API+'/health');
    el.innerHTML='<span class="ok">'+JSON.stringify(await r.json(),null,2)+'</span>';}
  catch(e){el.innerHTML='<span class="err">'+e.message+'</span>';}
}
async function placeOrder(){
  const dish=document.getElementById('dish').value.trim();
  const el=document.getElementById('order-out');
  if(!dish){el.innerHTML='<span class="err">Enter a dish name first</span>';return;}
  try{const r=await fetch(API+'/orders',{method:'POST',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({dish})});
    el.innerHTML='<span class="ok">'+JSON.stringify(await r.json(),null,2)+'</span>';
    loadOrders();}
  catch(e){el.innerHTML='<span class="err">'+e.message+'</span>';}
}
async function loadOrders(){
  const el=document.getElementById('order-table');
  try{const orders=await(await fetch(API+'/orders')).json();
    if(!orders.length){el.innerHTML='<p style="color:#64748b;margin-top:.5rem">No orders yet</p>';return;}
    el.innerHTML='<table><tr><th>Dish</th><th>Status</th><th>Time</th></tr>'
      +orders.map(o=>`<tr><td>${o.dish}</td><td>${o.status}</td><td>${new Date(o.timestamp).toLocaleTimeString()}</td></tr>`).join('')+'</table>';
  }catch(e){el.innerHTML='<span class="err">'+e.message+'</span>';}
}
checkHealth(); loadOrders();
</script>
</body></html>
